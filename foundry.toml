[profile.default]
src = "contracts"
out = "out"
script = "scripts"
libs = [ "dependencies" ]

solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
baseSepolia = "https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"
base = "https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"

[profile.default.fmt]
sort_imports = true
contract_new_lines = true
bracket_spacing = true

[profile.default.lint]
lint_on_build = true

[soldeer]
remappings_regenerate = false

[dependencies]
"@openzeppelin-contracts" = "5.6.0"
"@openzeppelin-contracts-upgradeable" = "5.6.0"
forge-std = "1.15.0"
solady = "0.1.15"
