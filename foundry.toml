[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test/solidity"
cache_path = "cache_forge"

# Exclude files that require exact Solidity =0.8.27
ignored_error_codes = ["license", "code-size"]
deny_warnings = false

# Compiler settings
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
auto_detect_solc = true

# Test settings
verbosity = 2
ffi = false
fs_permissions = [{ access = "read-write", path = "./"}]

# Coverage
[profile.coverage]
via_ir = true

# Remappings
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@account-abstraction/=node_modules/@account-abstraction/",
    "@openzeppelin/=node_modules/@openzeppelin/",
]
