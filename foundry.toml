[profile.default]
src = "contracts"
out = "out"
test = "test"
script = "scripts"
libs = ["dependencies"]

auto_detect_solc = true
optimizer = true
optimizer_runs = 200
evm_version = "shanghai"

[profile.default.fmt]
sort_imports = true
contract_new_lines = true
bracket_spacing = true

[profile.default.lint]
lint_on_build = true

fs_permissions = [{ access = "read", path = "out" }]

[rpc_endpoints]
baseSepolia = "https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"
base = "https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"

[soldeer]
remappings_regenerate = false

[dependencies]
forge-std = { version = "v1.14.0", git = "https://github.com/foundry-rs/forge-std.git", tag = "v1.14.0" }
"@openzeppelin-contracts" = "5.2.0"
"@openzeppelin-contracts-upgradeable" = "4.9.6"
createx = { version = "1.0.0", git = "https://github.com/pcaversaccio/createx.git", tag = "v1.0.0" }
solady = "0.1.15"
